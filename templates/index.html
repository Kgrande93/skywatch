<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skywatch</title>
<style>
  :root {
    --muted: #999;
    --accent: #00d4f0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 4vh 4vw;
    user-select: none;
    -webkit-user-select: none;
  }
  .card {
    max-width: 1600px;
    width: 100%;
  }
  .top-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .status-dot {
    width: clamp(9px, 1.2vw, 24px);
    height: clamp(9px, 1.2vw, 24px);
    border-radius: 50%;
  }
  .status-dot.live { background: #37e07a; box-shadow: 0 0 8px #37e07a; }
  .status-dot.idle { background: var(--muted); }
  .status-label {
    font-size: clamp(12px, 2vw, 34px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .intro {
    font-size: clamp(11px, 1.5vw, 20px);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    text-align: center;
    margin-bottom: clamp(24px, 5vh, 80px);
    max-width: 95%;
    margin-left: auto;
    margin-right: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 4vw, 64px);
    text-align: left;
    width: 100%;
    min-height: clamp(56px, 8.8vw, 160px);
  }
  .header > div:last-child {
    width: clamp(220px, 42vw, 760px);
    flex-shrink: 0;
  }
  .logo-box {
    width: clamp(140px, 22vw, 400px);
    height: clamp(56px, 8.8vw, 160px);
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    padding: 8px 16px;
  }
  .logo-box.has-logo {
    background: #fff;
  }
  .logo-box img {
    height: 62%;
    width: auto;
    max-width: 92%;
    object-fit: contain;
  }
  .logo-box .no-logo-icon {
    width: 42%;
    height: 42%;
    opacity: 0.35;
  }
  .flight-number {
    font-size: clamp(28px, 6vw, 90px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    line-height: 1.1;
    overflow-wrap: break-word;
    min-height: 1.1em;
  }
  .flag-icon {
    font-size: 0.4em;
    vertical-align: middle;
  }
  .airline-name {
    font-size: clamp(15px, 3vw, 46px);
    color: var(--muted);
    margin-top: 6px;
    height: 1.3em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .reg-type {
    font-size: clamp(13px, 2.2vw, 34px);
    color: var(--muted);
    opacity: 0.75;
    margin-top: 2px;
    height: 1.3em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: clamp(22px, 5vh, 72px) 0;
  }
  .route {
    font-size: clamp(18px, 3.6vw, 56px);
    color: #fff;
    text-align: center;
    height: 1.3em;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .status-line {
    font-size: clamp(15px, 2.6vw, 40px);
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
  }
  .metrics {
    display: flex;
    justify-content: center;
    gap: clamp(32px, 6vw, 100px);
    margin-top: clamp(22px, 5vh, 72px);
    height: clamp(70px, 11vw, 180px);
  }
  .metrics > div {
    width: clamp(90px, 15vw, 240px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .metric-value {
    font-size: clamp(20px, 4vw, 64px);
    font-weight: 600;
    color: #fff;
    text-align: center;
    white-space: nowrap;
  }
  .metric-label { font-size: clamp(11px, 1.8vw, 28px); color: var(--muted); text-transform: uppercase; margin-top: 6px; text-align: center; }
  .idle-text {
    font-size: clamp(17px, 3.6vw, 52px);
    color: #fff;
    line-height: 1.6;
    text-align: center;
  }
  .idle-text strong { color: var(--accent); }
  .empty { color: var(--muted); font-size: clamp(15px, 2.4vw, 36px); text-align: center; }
  .dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: clamp(24px, 5vh, 64px);
  }
  .dot { width: clamp(6px, 1vw, 16px); height: clamp(6px, 1vw, 16px); border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.on { background: var(--accent); }
  .emergency-banner {
    background: #b00000;
    color: #fff;
    font-weight: 700;
    text-align: center;
    padding: clamp(10px, 1.6vh, 20px);
    border-radius: 8px;
    margin-bottom: clamp(16px, 3vh, 32px);
    font-size: clamp(15px, 2.4vw, 38px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    animation: emergency-pulse 1.2s infinite;
  }
  @keyframes emergency-pulse {
    0%, 100% { background: #b00000; }
    50% { background: #ff2020; }
  }
  .landed-banner {
    background: rgba(55,224,122,0.15);
    color: #37e07a;
    font-weight: 700;
    text-align: center;
    padding: clamp(10px, 1.6vh, 20px);
    border-radius: 8px;
    margin-bottom: clamp(16px, 3vh, 32px);
    font-size: clamp(15px, 2.4vw, 38px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .rotate-progress-track {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 3px;
    background: rgba(255,255,255,0.06);
    display: none;
  }
  .rotate-progress-track.visible { display: block; }
  .rotate-progress-bar {
    height: 100%;
    width: 100%;
    background: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top-status">
      <span id="statusDot" class="status-dot idle"></span>
      <span id="statusLabel" class="status-label">Kobler til …</span>
    </div>
    <div id="intro" class="intro"></div>
    <div id="content"></div>
    <div id="dots" class="dots"></div>
  </div>
  <div id="rotateProgressTrack" class="rotate-progress-track">
    <div id="rotateProgressBar" class="rotate-progress-bar"></div>
  </div>

<script>
const ROTATE_MS = 10000;
let currentList = [];
let currentHex = null;

function fmtTime(epochSeconds) {
  const d = new Date(epochSeconds * 1000);
  return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
}

function flightLabel(ac) {
  return ac.flight_iata || ac.flight_icao || ac.callsign || 'Ukjent';
}

function isoToFlagEmoji(iso) {
  if (!iso || iso.length !== 2) return '';
  const codePoints = [...iso.toUpperCase()].map(c => 127397 + c.charCodeAt(0));
  return String.fromCodePoint(...codePoints);
}

const EMERGENCY_SQUAWKS = {
  '7500': 'KAPRING (SQUAWK 7500)',
  '7600': 'RADIOSVIKT (SQUAWK 7600)',
  '7700': 'NØDSITUASJON (SQUAWK 7700)',
};

function emergencyLabel(ac) {
  if (ac.emergency) return `NØDSITUASJON (${ac.emergency.toUpperCase()})`;
  if (ac.squawk && EMERGENCY_SQUAWKS[ac.squawk]) return EMERGENCY_SQUAWKS[ac.squawk];
  return null;
}

const COUNTRY_NO = {
  "Norway": "Norge", "Sweden": "Sverige", "Denmark": "Danmark", "Finland": "Finland",
  "Iceland": "Island", "Germany": "Tyskland", "United Kingdom": "Storbritannia",
  "France": "Frankrike", "Spain": "Spania", "Italy": "Italia", "Poland": "Polen",
  "Netherlands": "Nederland", "Belgium": "Belgia", "Switzerland": "Sveits",
  "Austria": "Østerrike", "Portugal": "Portugal", "Greece": "Hellas",
  "Ireland": "Irland", "Croatia": "Kroatia", "Turkey": "Tyrkia",
  "United States": "USA", "United Arab Emirates": "De forente arabiske emirater",
  "Latvia": "Latvia", "Lithuania": "Litauen", "Estonia": "Estland",
  "Czech Republic": "Tsjekkia", "Hungary": "Ungarn", "Slovakia": "Slovakia",
  "Slovenia": "Slovenia", "Romania": "Romania", "Bulgaria": "Bulgaria",
  "Morocco": "Marokko", "Thailand": "Thailand", "Egypt": "Egypt",
};

function airportLabel(ap) {
  if (!ap) return null;
  const code = ap.iata_code;
  const city = ap.municipality;
  if (!code) return city || ap.name || null;
  if (!city) return code;
  const country = ap.country_name && ap.country_name !== "Norway"
    ? (COUNTRY_NO[ap.country_name] || ap.country_name)
    : null;
  return country ? `${code} (${city}, ${country})` : `${code} (${city})`;
}

function renderActive(ac) {
  const origin = airportLabel(ac.origin);
  const dest = airportLabel(ac.destination);
  const sameAirport = ac.origin && ac.destination && ac.origin.iata_code === ac.destination.iata_code;
  let routeLine = null;
  if (sameAirport) routeLine = null;
  else if (origin && dest) routeLine = `${origin} &rarr; ${dest}`;
  else if (dest) routeLine = `til ${dest}`;

  let html = '';
  const emergency = emergencyLabel(ac);
  if (emergency) {
    html += `<div class="emergency-banner">&#9888; ${emergency}</div>`;
  } else if (ac.landed) {
    html += `<div class="landed-banner">LANDET</div>`;
  }

  html += '<div class="header">';
  const planeIconSvg = '<svg class="no-logo-icon" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><path d="M12 2L2 14h6l1 8 3-4 3 4 1-8h6z"/></svg>';
  if (ac.airline_logo) {
    html += `<div class="logo-box has-logo"><img src="${ac.airline_logo}" alt="${ac.airline_name || ''}" onerror="this.parentElement.classList.remove('has-logo'); this.outerHTML='${planeIconSvg.replace(/'/g, "\\'")}';"></div>`;
  } else {
    html += `<div class="logo-box">${planeIconSvg}</div>`;
  }
  html += '<div>';
  html += `<div class="flight-number" id="flightNumberEl">${flightLabel(ac)}</div>`;
  const nameLine = ac.operator_country ? `${ac.airline_name || ''} · ${ac.operator_country}` : (ac.airline_name || '');
  html += `<div class="airline-name">${nameLine}</div>`;
  const flag = isoToFlagEmoji(ac.registration_country_iso);
  const regWithFlag = flag && ac.registration ? `${flag} ${ac.registration}` : ac.registration;
  const regType = [regWithFlag, ac.aircraft_type].filter(Boolean).join(' · ');
  html += `<div class="reg-type">${regType}</div>`;
  html += '</div>';
  html += '</div>';

  html += '<div class="divider"></div>';
  html += `<div class="route">${routeLine || ''}</div>`;

  let altStr = ac.altitude_ft != null ? `${Math.round(ac.altitude_ft)} ft` : '–';
  if (ac.altitude_ft != null && ac.vertical_rate_fpm != null) {
    if (ac.vertical_rate_fpm > 150) altStr += ' &#8593;';
    else if (ac.vertical_rate_fpm < -150) altStr += ' &#8595;';
    else altStr += ' &#8594;';
  }
  const gsStr = ac.groundspeed_kt != null ? `${Math.round(ac.groundspeed_kt)} kt` : '–';
  const distStr = ac.distance_km != null ? `${ac.distance_km} km` : '–';
  const squawkStr = ac.squawk || '–';
  const squawkIsEmergency = ac.squawk && EMERGENCY_SQUAWKS[ac.squawk];
  const squawkStyle = squawkIsEmergency ? ' style="color:#ff3b3b;font-weight:800;"' : '';
  html += '<div class="metrics">';
  html += `<div><div class="metric-value">${altStr}</div><div class="metric-label">Høyde</div></div>`;
  html += `<div><div class="metric-value">${gsStr}</div><div class="metric-label">Fart</div></div>`;
  html += `<div><div class="metric-value">${distStr}</div><div class="metric-label">Avstand</div></div>`;
  html += `<div><div class="metric-value"${squawkStyle}>${squawkStr}</div><div class="metric-label">Squawk</div></div>`;
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function renderDots() {
  const dotsEl = document.getElementById('dots');
  if (currentList.length <= 1) {
    dotsEl.innerHTML = '';
    return;
  }
  dotsEl.innerHTML = currentList.map((ac) =>
    `<span class="dot ${ac.hex === currentHex ? 'on' : ''}"></span>`).join('');
}

function updateProgressVisibility() {
  const track = document.getElementById('rotateProgressTrack');
  if (!track) return;
  if (currentList.length > 1) track.classList.add('visible');
  else track.classList.remove('visible');
}

function restartProgressBar() {
  const bar = document.getElementById('rotateProgressBar');
  if (!bar) return;
  updateProgressVisibility();
  if (currentList.length <= 1) return;
  bar.style.transition = 'none';
  bar.style.width = '100%';
  void bar.offsetWidth; // force reflow so the transition below actually restarts
  bar.style.transition = `width ${ROTATE_MS}ms linear`;
  bar.style.width = '0%';
}

function showCurrent() {
  if (currentList.length === 0) return;
  let ac = currentList.find(a => a.hex === currentHex);
  if (!ac) {
    // currently shown plane is gone (left range) - fall back to the first
    // one in the (stable, hex-sorted) list rather than waiting for a tick
    ac = currentList[0];
    currentHex = ac.hex;
  }
  renderActive(ac);
  renderDots();
}

function updateList(list) {
  const wasRotating = currentList.length > 1;
  currentList = list;
  showCurrent();
  const isRotatingNow = currentList.length > 1;
  if (!wasRotating && isRotatingNow) {
    restartProgressBar();
  } else {
    updateProgressVisibility();
  }
}

// Runs continuously from page load, independent of polling/data changes -
// this way list refreshes every 5s don't affect which plane is shown or
// when the next switch happens; only this timer decides that.
setInterval(() => {
  if (currentList.length > 1) {
    const idx = currentList.findIndex(a => a.hex === currentHex);
    const nextIdx = idx === -1 ? 0 : (idx + 1) % currentList.length;
    currentHex = currentList[nextIdx].hex;
    showCurrent();
    restartProgressBar();
  }
}, ROTATE_MS);

function render(data) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const intro = document.getElementById('intro');
  const content = document.getElementById('content');

  if (data.active && data.aircraft_list && data.aircraft_list.length > 0) {
    dot.className = 'status-dot live';
    label.textContent = data.aircraft_list.length > 1
      ? `Aktiv forbindelse (${data.aircraft_list.length} fly)`
      : 'Aktiv forbindelse';
    intro.textContent = data.aircraft_list.length > 1
      ? 'Dette er flyene du kan se på himmelen, hentet fra min ADS\u2011B\u2011antenne'
      : 'Dette er flyet du kan se på himmelen, hentet fra min ADS\u2011B\u2011antenne';
    updateList(data.aircraft_list);

  } else if (data.last) {
    currentList = [];
    currentHex = null;
    document.getElementById('dots').innerHTML = '';
    document.getElementById('rotateProgressTrack').classList.remove('visible');
    const ac = data.last;
    dot.className = 'status-dot idle';
    label.textContent = 'Ingen aktiv forbindelse';
    intro.textContent = 'Ingen fly synlig på himmelen akkurat nå';

    const dest = airportLabel(ac.destination);
    const seenTime = fmtTime(ac.seen_epoch);
    let etaHtml = '';
    if (ac.eta && !ac.eta.landed_estimate) {
      etaHtml = ` &mdash; estimert landing ca. <strong>${fmtTime(ac.eta.epoch)}</strong>`;
    } else if (ac.eta && ac.eta.landed_estimate) {
      etaHtml = ` &mdash; trolig landet rundt <strong>${seenTime}</strong>`;
    }

    let html = '<div class="header">';
    html += '<div class="logo-box">';
    if (ac.airline_logo) {
      html += `<img src="${ac.airline_logo}" alt="${ac.airline_name || ''}" onerror="this.parentElement.style.display='none'">`;
    }
    html += '</div>';
    html += '<div>';
    html += `<div class="flight-number">${flightLabel(ac)}</div>`;
    if (ac.airline_name) html += `<div class="airline-name">${ac.airline_name}</div>`;
    html += '</div>';
    html += '</div>';
    html += '<div class="divider"></div>';
    html += `<div class="idle-text">Siste fly som kunne sees på himmelen`;
    if (dest) html += ` til <strong>${dest}</strong>`;
    html += `, kl. ${seenTime}${etaHtml}.</div>`;
    content.innerHTML = html;

  } else {
    currentList = [];
    currentHex = null;
    document.getElementById('rotateProgressTrack').classList.remove('visible');
    dot.className = 'status-dot idle';
    label.textContent = 'Ingen data ennå';
    intro.textContent = '';
    content.innerHTML = '<div class="empty">Venter på første fly …</div>';
  }
}

async function poll() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('statusLabel').textContent = 'Ingen kontakt med server';
  }
}

poll();
setInterval(poll, 1000);

// Keep the screen from sleeping on devices/browsers that support it
// (Chrome/Android/ChromeOS). Re-request if the tab regains visibility,
// since the lock is released automatically when it's hidden.
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    await navigator.wakeLock.request('screen');
  } catch (e) {
    // ignore - not fatal, just means the screen might sleep on its own
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
</script>
</body>
</html>
