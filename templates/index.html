<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skywatch</title>
<style>
  :root {
    --muted: #999;
    --accent: #00d4f0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 4vh 4vw;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .card {
    max-width: 900px;
    width: 100%;
  }
  .top-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: clamp(9px, 1vw, 16px);
    height: clamp(9px, 1vw, 16px);
    border-radius: 50%;
  }
  .status-dot.live { background: #37e07a; box-shadow: 0 0 8px #37e07a; }
  .status-dot.idle { background: var(--muted); }
  .status-label {
    font-size: clamp(12px, 1.6vw, 22px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .intro {
    font-size: clamp(13px, 1.8vw, 24px);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    text-align: center;
    margin-bottom: clamp(24px, 4vh, 56px);
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
  }
  .header {
    display: flex;
    align-items: center;
    gap: clamp(20px, 3vw, 44px);
  }
  .logo-box {
    width: clamp(140px, 16vw, 260px);
    height: clamp(56px, 6.4vw, 104px);
    background: #fff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    padding: 6px 12px;
  }
  .logo-box img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }
  .flight-number {
    font-size: clamp(34px, 6vw, 96px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .airline-name {
    font-size: clamp(15px, 2.2vw, 30px);
    color: var(--muted);
    margin-top: 4px;
  }
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: clamp(22px, 4vh, 48px) 0;
  }
  .route {
    font-size: clamp(18px, 2.6vw, 36px);
    color: #fff;
  }
  .status-line {
    font-size: clamp(15px, 2vw, 26px);
    color: var(--muted);
    margin-top: 4px;
  }
  .metrics {
    display: flex;
    gap: clamp(32px, 5vw, 72px);
    margin-top: clamp(22px, 4vh, 48px);
  }
  .metric-value { font-size: clamp(20px, 3vw, 44px); font-weight: 600; color: #fff; }
  .metric-label { font-size: clamp(11px, 1.4vw, 20px); color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  .idle-text {
    font-size: clamp(17px, 2.6vw, 36px);
    color: #fff;
    line-height: 1.6;
  }
  .idle-text strong { color: var(--accent); }
  .empty { color: var(--muted); font-size: clamp(15px, 2vw, 26px); text-align: center; }
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: clamp(24px, 4vh, 48px);
  }
  .dot { width: clamp(6px, 0.8vw, 12px); height: clamp(6px, 0.8vw, 12px); border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.on { background: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="top-status">
      <span id="statusDot" class="status-dot idle"></span>
      <span id="statusLabel" class="status-label">Kobler til …</span>
    </div>
    <div id="intro" class="intro"></div>
    <div id="content"></div>
    <div id="dots" class="dots"></div>
  </div>

<script>
const ROTATE_MS = 6000;
let currentList = [];
let rotateIndex = 0;
let rotateTimer = null;

function fmtTime(epochSeconds) {
  const d = new Date(epochSeconds * 1000);
  return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
}

function flightLabel(ac) {
  return ac.flight_iata || ac.flight_icao || ac.callsign || 'Ukjent';
}

function airportLabel(ap) {
  if (!ap) return null;
  return ap.iata_code || ap.municipality || ap.name;
}

function renderActive(ac) {
  const origin = airportLabel(ac.origin);
  const dest = airportLabel(ac.destination);
  let routeLine = null;
  if (origin && dest) routeLine = `${origin} &rarr; ${dest}`;
  else if (dest) routeLine = `til ${dest}`;

  let html = '<div class="header">';
  html += '<div class="logo-box">';
  if (ac.airline_logo) {
    html += `<img src="${ac.airline_logo}" alt="${ac.airline_name || ''}" onerror="this.parentElement.style.display='none'">`;
  }
  html += '</div>';
  html += '<div>';
  html += `<div class="flight-number">${flightLabel(ac)}</div>`;
  if (ac.airline_name) html += `<div class="airline-name">${ac.airline_name}</div>`;
  html += '</div>';
  html += '</div>';

  html += '<div class="divider"></div>';
  if (routeLine) html += `<div class="route">${routeLine}</div>`;

  html += '<div class="metrics">';
  if (ac.altitude_ft != null) html += `<div><div class="metric-value">${Math.round(ac.altitude_ft)} ft</div><div class="metric-label">Høyde</div></div>`;
  if (ac.groundspeed_kt != null) html += `<div><div class="metric-value">${Math.round(ac.groundspeed_kt)} kt</div><div class="metric-label">Fart</div></div>`;
  if (ac.distance_km != null) html += `<div><div class="metric-value">${ac.distance_km} km</div><div class="metric-label">Avstand</div></div>`;
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function renderDots() {
  const dotsEl = document.getElementById('dots');
  if (currentList.length <= 1) {
    dotsEl.innerHTML = '';
    return;
  }
  dotsEl.innerHTML = currentList.map((_, i) =>
    `<span class="dot ${i === rotateIndex ? 'on' : ''}"></span>`).join('');
}

function showCurrent() {
  if (currentList.length === 0) return;
  if (rotateIndex >= currentList.length) rotateIndex = 0;
  renderActive(currentList[rotateIndex]);
  renderDots();
}

function updateList(list) {
  currentList = list;
  if (rotateIndex >= currentList.length) rotateIndex = 0;
  showCurrent();

  if (currentList.length > 1 && !rotateTimer) {
    rotateTimer = setInterval(() => {
      rotateIndex = (rotateIndex + 1) % currentList.length;
      showCurrent();
    }, ROTATE_MS);
  } else if (currentList.length <= 1 && rotateTimer) {
    clearInterval(rotateTimer);
    rotateTimer = null;
  }
}

function render(data) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const intro = document.getElementById('intro');
  const content = document.getElementById('content');

  if (data.active && data.aircraft_list && data.aircraft_list.length > 0) {
    dot.className = 'status-dot live';
    label.textContent = data.aircraft_list.length > 1
      ? `Aktiv forbindelse (${data.aircraft_list.length} fly)`
      : 'Aktiv forbindelse';
    intro.textContent = data.aircraft_list.length > 1
      ? 'Dette er flyene du kan se på himmelen, hentet fra min ADS\u2011B\u2011antenne'
      : 'Dette er flyet du kan se på himmelen, hentet fra min ADS\u2011B\u2011antenne';
    updateList(data.aircraft_list);

  } else if (data.last) {
    if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
    currentList = [];
    document.getElementById('dots').innerHTML = '';
    const ac = data.last;
    dot.className = 'status-dot idle';
    label.textContent = 'Ingen aktiv forbindelse';
    intro.textContent = 'Ingen fly synlig på himmelen akkurat nå';

    const dest = airportLabel(ac.destination);
    const seenTime = fmtTime(ac.seen_epoch);
    let etaHtml = '';
    if (ac.eta && !ac.eta.landed_estimate) {
      etaHtml = ` &mdash; estimert landing ca. <strong>${fmtTime(ac.eta.epoch)}</strong>`;
    } else if (ac.eta && ac.eta.landed_estimate) {
      etaHtml = ` &mdash; trolig landet rundt <strong>${seenTime}</strong>`;
    }

    let html = '<div class="header">';
    html += '<div class="logo-box">';
    if (ac.airline_logo) {
      html += `<img src="${ac.airline_logo}" alt="${ac.airline_name || ''}" onerror="this.parentElement.style.display='none'">`;
    }
    html += '</div>';
    html += '<div>';
    html += `<div class="flight-number">${flightLabel(ac)}</div>`;
    if (ac.airline_name) html += `<div class="airline-name">${ac.airline_name}</div>`;
    html += '</div>';
    html += '</div>';
    html += '<div class="divider"></div>';
    html += `<div class="idle-text">Siste fly som kunne sees på himmelen`;
    if (dest) html += ` til <strong>${dest}</strong>`;
    html += `, kl. ${seenTime}${etaHtml}.</div>`;
    content.innerHTML = html;

  } else {
    if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
    dot.className = 'status-dot idle';
    label.textContent = 'Ingen data ennå';
    intro.textContent = '';
    content.innerHTML = '<div class="empty">Venter på første fly …</div>';
  }
}

async function poll() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('statusLabel').textContent = 'Ingen kontakt med server';
  }
}

poll();
setInterval(poll, 5000);

// Keep the screen from sleeping on devices/browsers that support it
// (Chrome/Android/ChromeOS). Re-request if the tab regains visibility,
// since the lock is released automatically when it's hidden.
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    await navigator.wakeLock.request('screen');
  } catch (e) {
    // ignore - not fatal, just means the screen might sleep on its own
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
</script>
</body>
</html>
